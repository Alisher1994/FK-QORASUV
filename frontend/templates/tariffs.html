<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тарифы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="sidebar">
        <h2>⚽ FK QORASUV</h2>
        <nav>
            <a href="{{ url_for('dashboard') }}">📊 Главная</a>
            <a href="{{ url_for('students') }}">👥 Ученики</a>
            <a href="{{ url_for('groups_page') }}">👨‍👩‍👦 Группы</a>
            <a href="{{ url_for('tariffs_page') }}" class="active">💳 Тарифы</a>
            <a href="{{ url_for('finances_page') }}">💰 Финансы</a>
            <a href="{{ url_for('attendance_page') }}">📋 Посещаемость</a>
            <a href="{{ url_for('camera_page') }}">📷 Камера</a>
            <a href="{{ url_for('expenses_page') }}">📤 Расходы</a>
            <a href="{{ url_for('logout') }}">🚪 Выход</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>💳 Тарифные планы</h1>
            <button id="addTariffBtn" class="btn-primary">➕ Добавить тариф</button>
        </div>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>Название</th>
                    <th>Занятий</th>
                    <th>Стоимость</th>
                    <th>Цена за занятие</th>
                    <th>Описание</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="tariffsTableBody">
                <!-- Заполнится через JS -->
            </tbody>
        </table>
    </div>

    <!-- Модальное окно: Добавить тариф -->
    <div id="addTariffModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close">&times;</span>
            <h2>Добавить тариф</h2>
            
            <form id="addTariffForm">
                <div class="form-group">
                    <label>Название тарифа *</label>
                    <input type="text" name="name" required placeholder="Тариф 8 занятий">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Количество занятий *</label>
                        <input type="number" name="lessons_count" required min="1" placeholder="8">
                    </div>
                    <div class="form-group">
                        <label>Стоимость (сум) *</label>
                        <input type="number" name="price" required min="0" step="1000" placeholder="360000">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea name="description" rows="3" placeholder="Стандартный тариф на месяц"></textarea>
                </div>
                
                <button type="submit" class="btn-primary btn-large">➕ Добавить</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно: Редактировать тариф -->
    <div id="editTariffModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close">&times;</span>
            <h2>Редактировать тариф</h2>
            
            <form id="editTariffForm">
                <input type="hidden" id="edit_tariff_id">
                
                <div class="form-group">
                    <label>Название тарифа *</label>
                    <input type="text" id="edit_name" name="name" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Количество занятий *</label>
                        <input type="number" id="edit_lessons_count" name="lessons_count" required min="1">
                    </div>
                    <div class="form-group">
                        <label>Стоимость (сум) *</label>
                        <input type="number" id="edit_price" name="price" required min="0" step="1000">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="edit_description" name="description" rows="3"></textarea>
                </div>
                
                <button type="submit" class="btn-primary btn-large">💾 Сохранить</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/tariffs.js') }}"></script>
</body>
</html>
